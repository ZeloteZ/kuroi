name: kuroi-local

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kuroi
      POSTGRES_USER: kuroi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kuroi_local_dev_password}
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuroi -d kuroi"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_OIDC_ENABLED: "false"
    image: kuroi-app:local
    restart: unless-stopped
    ports:
      - "3000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://kuroi:${POSTGRES_PASSWORD:-kuroi_local_dev_password}@db:5432/kuroi
      APP_SECRET: ${APP_SECRET:-local-dev-only-secret-change-me}
      FRONTEND_URL: "http://localhost:3000"
      OIDC_ENABLED: "false"
      OIDC_ISSUER_URL: ""
      OIDC_CLIENT_ID: ""
      OIDC_CLIENT_SECRET: ""
      OIDC_REDIRECT_URI: "http://localhost:3000/auth/oidc/callback"
      OIDC_TOKEN_AUTH_METHOD: "auto"
      OIDC_USE_PKCE: "true"
      ALLOW_INVITE_LINK_CREATION: "true"
      STEAM_API_KEY: "${STEAM_API_KEY:-}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_local_data:
