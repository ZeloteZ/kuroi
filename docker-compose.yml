name: kuroi

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kuroi
      POSTGRES_USER: kuroi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuroi -d kuroi"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://kuroi:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/kuroi
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:8000/auth/oidc/callback}
      OIDC_TOKEN_AUTH_METHOD: ${OIDC_TOKEN_AUTH_METHOD:-auto}
      OIDC_USE_PKCE: ${OIDC_USE_PKCE:-true}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_OIDC_ENABLED: ${OIDC_ENABLED:-true}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
